<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Payment Creation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Debug Payment Creation</h1>
        
        <div class="card p-4">
            <h3>Test Payment Initiation</h3>
            
            <form id="debugPaymentForm">
                <div class="mb-3">
                    <label for="orderId" class="form-label">Order ID</label>
                    <input type="number" class="form-control" id="orderId" value="1" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Test Payment Initiation</button>
            </form>
            
            <div id="result" class="mt-4">
                <h5>Result:</h5>
                <pre id="resultText" style="background-color: #f8f9fa; padding: 10px; border-radius: 5px; max-height: 400px; overflow-y: auto;"></pre>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('debugPaymentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const orderId = document.getElementById('orderId').value;
            
            try {
                // Get auth token
                const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token') || '';
                
                if (!token) {
                    document.getElementById('resultText').textContent = 'Error: No authentication token found. Please log in first.';
                    return;
                }
                
                // First, get the order details to check the total amount
                console.log('Fetching order details...');
                const orderResponse = await fetch(`/api/customer/orders/${orderId}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                const orderData = await orderResponse.json();
                console.log('Order data:', orderData);
                
                if (!orderResponse.ok) {
                    document.getElementById('resultText').textContent = 
                        `Error fetching order: ${orderResponse.status} ${orderResponse.statusText}\n${JSON.stringify(orderData, null, 2)}`;
                    return;
                }
                
                const order = orderData.data;
                console.log('Order total amount:', order.total_amount);
                
                if (!order.total_amount || order.total_amount <= 0) {
                    document.getElementById('resultText').textContent = 
                        `Error: Order total amount is invalid: ${order.total_amount}\nOrder: ${JSON.stringify(order, null, 2)}`;
                    return;
                }
                
                // Now try to initiate payment
                console.log('Initiating payment...');
                const response = await fetch('/api/payments/bakong/initiate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        order_id: parseInt(orderId)
                    })
                });
                
                // Get response text first to see what we're getting
                const responseText = await response.text();
                console.log('Raw payment response:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    document.getElementById('resultText').textContent = 
                        `Status: ${response.status} ${response.statusText}\n\nResponse (not JSON):\n${responseText}`;
                    return;
                }
                
                const result = {
                    status: response.status,
                    statusText: response.statusText,
                    headers: {
                        'content-type': response.headers.get('content-type')
                    },
                    order_details: {
                        id: order.id,
                        total_amount: order.total_amount,
                        payment_status: order.payment_status,
                        order_status: order.order_status
                    },
                    payment_response: data
                };
                
                document.getElementById('resultText').textContent = JSON.stringify(result, null, 2);
                
            } catch (error) {
                document.getElementById('resultText').textContent = 'Error: ' + error.message;
                console.error('Payment initiation error:', error);
            }
        });
    </script>
</body>
</html>
