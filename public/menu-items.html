<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Items - Order & Pay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .card {
            max-width: 1200px;
            margin: 0 auto;
        }
        .menu-item {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background-color: white;
            transition: box-shadow 0.2s;
        }
        .menu-item:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .menu-item img {
            max-width: 100px;
            max-height: 100px;
            object-fit: cover;
            border-radius: 5px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .cart-total {
            font-weight: bold;
            font-size: 1.2em;
            text-align: right;
            padding: 10px;
            border-top: 2px solid #dee2e6;
        }
        .quantity-control {
            display: flex;
            align-items: center;
        }
        .quantity-btn {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .quantity-input {
            width: 50px;
            text-align: center;
            border: 1px solid #ced4da;
            border-radius: 4px;
            height: 30px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12">
                <h1 class="text-center mb-4">Menu Items</h1>
                
                <div class="card p-4">
                    <div class="row">
                        <div class="col-md-8">
                            <h3>Available Items</h3>
                            <div id="menu-items-container">
                                <div class="text-center py-5">
                                    <div class="spinner-border" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p class="mt-2">Loading menu items...</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <h3>Your Order</h3>
                            <div class="card">
                                <div class="card-body">
                                    <div id="cart-items">
                                        <p class="text-muted">Your cart is empty</p>
                                    </div>
                                    <div id="cart-total" class="cart-total">
                                        Total: $<span id="total-amount">0.00</span>
                                    </div>
                                    <div id="order-actions" class="mt-3">
                                        <button id="clear-cart-btn" class="btn btn-outline-danger btn-sm w-100 mb-2">Clear Cart</button>
                                        <button id="proceed-to-payment-btn" class="btn btn-success w-100" disabled>Proceed to Payment</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuItemsContainer = document.getElementById('menu-items-container');
            const cartItemsContainer = document.getElementById('cart-items');
            const totalAmountElement = document.getElementById('total-amount');
            const clearCartBtn = document.getElementById('clear-cart-btn');
            const proceedToPaymentBtn = document.getElementById('proceed-to-payment-btn');
            
            let menuItems = [];
            let cart = {};
            
            // Function to get auth token
            function getAuthToken() {
                return localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token') || '';
            }
            
            // Load menu items
            async function loadMenuItems() {
                try {
                    const response = await fetch('/api/menu-items', {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'Authorization': 'Bearer ' + getAuthToken()
                        }
                    });
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error('API Error:', errorText);
                        menuItemsContainer.innerHTML = `<div class="alert alert-danger">Error loading menu items: ${response.status} - ${response.statusText}</div>`;
                        return;
                    }
                    
                    const data = await response.json();
                    menuItems = data.data;
                    
                    displayMenuItems();
                } catch (error) {
                    console.error('Error loading menu items:', error);
                    menuItemsContainer.innerHTML = `<div class="alert alert-danger">Error loading menu items: ${error.message}</div>`;
                }
            }
            
            // Display menu items
            function displayMenuItems() {
                if (menuItems.length === 0) {
                    menuItemsContainer.innerHTML = '<div class="alert alert-info">No menu items available</div>';
                    return;
                }
                
                let html = '';
                menuItems.forEach(item => {
                    html += `
                    <div class="menu-item">
                        <div class="row align-items-center">
                            <div class="col-md-2">
                                ${item.image_url ? `<img src="${item.image_url}" alt="${item.item_name}" class="img-fluid">` : 
                                  `<div class="bg-secondary text-white d-flex align-items-center justify-content-center" style="width: 100px; height: 100px; border-radius: 5px;">
                                      <span class="fw-bold">${item.item_name.charAt(0)}</span>
                                   </div>`}
                            </div>
                            <div class="col-md-6">
                                <h5>${item.item_name}</h5>
                                <p class="text-muted mb-1">${item.description || 'No description'}</p>
                                <p class="text-success fw-bold">$${parseFloat(item.price).toFixed(2)}</p>
                            </div>
                            <div class="col-md-4">
                                <div class="quantity-control">
                                    <button class="btn btn-outline-secondary quantity-btn" onclick="decreaseQuantity(${item.id})">-</button>
                                    <input type="number" class="quantity-input mx-2" id="qty-${item.id}" value="0" min="0" onchange="updateQuantity(${item.id})">
                                    <button class="btn btn-outline-secondary quantity-btn" onclick="increaseQuantity(${item.id})">+</button>
                                </div>
                                <button class="btn btn-primary w-100 mt-2" onclick="addToCart(${item.id})">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                    `;
                });
                
                menuItemsContainer.innerHTML = html;
            }
            
            // Add to cart function
            function addToCart(itemId) {
                const item = menuItems.find(i => i.id === itemId);
                if (!item) return;
                
                const qtyInput = document.getElementById(`qty-${itemId}`);
                const quantity = parseInt(qtyInput.value) || 0;
                
                if (quantity <= 0) {
                    alert('Please select a quantity greater than 0');
                    return;
                }
                
                if (cart[itemId]) {
                    cart[itemId].quantity += quantity;
                } else {
                    cart[itemId] = {
                        item: item,
                        quantity: quantity
                    };
                }
                
                // Reset the quantity input
                qtyInput.value = 0;
                
                updateCartDisplay();
            }
            
            // Increase quantity
            function increaseQuantity(itemId) {
                const qtyInput = document.getElementById(`qty-${itemId}`);
                const currentQty = parseInt(qtyInput.value) || 0;
                qtyInput.value = currentQty + 1;
            }
            
            // Decrease quantity
            function decreaseQuantity(itemId) {
                const qtyInput = document.getElementById(`qty-${itemId}`);
                const currentQty = parseInt(qtyInput.value) || 0;
                if (currentQty > 0) {
                    qtyInput.value = currentQty - 1;
                }
            }
            
            // Update quantity directly
            function updateQuantity(itemId) {
                const qtyInput = document.getElementById(`qty-${itemId}`);
                const newQty = parseInt(qtyInput.value) || 0;
                qtyInput.value = newQty;
            }
            
            // Update cart display
            function updateCartDisplay() {
                if (Object.keys(cart).length === 0) {
                    cartItemsContainer.innerHTML = '<p class="text-muted">Your cart is empty</p>';
                    totalAmountElement.textContent = '0.00';
                    proceedToPaymentBtn.disabled = true;
                    return;
                }
                
                let cartHtml = '';
                let total = 0;
                
                for (const itemId in cart) {
                    const cartItem = cart[itemId];
                    const itemTotal = cartItem.quantity * cartItem.item.price;
                    total += itemTotal;
                    
                    cartHtml += `
                    <div class="cart-item">
                        <div>
                            <strong>${cartItem.item.item_name}</strong><br>
                            <small class="text-muted">${cartItem.quantity} x $${parseFloat(cartItem.item.price).toFixed(2)}</small>
                        </div>
                        <div class="text-end">
                            <div>$${parseFloat(itemTotal).toFixed(2)}</div>
                            <button class="btn btn-outline-danger btn-sm mt-1" onclick="removeFromCart(${cartItem.item.id})">Remove</button>
                        </div>
                    </div>
                    `;
                }
                
                cartItemsContainer.innerHTML = cartHtml;
                totalAmountElement.textContent = parseFloat(total).toFixed(2);
                proceedToPaymentBtn.disabled = false;
            }
            
            // Remove from cart
            function removeFromCart(itemId) {
                delete cart[itemId];
                updateCartDisplay();
            }
            
            // Clear cart
            clearCartBtn.addEventListener('click', function() {
                cart = {};
                updateCartDisplay();
            });
            
            // Proceed to payment
            proceedToPaymentBtn.addEventListener('click', async function() {
                if (Object.keys(cart).length === 0) {
                    alert('Your cart is empty');
                    return;
                }
                
                // Create order with items
                const orderItems = [];
                for (const itemId in cart) {
                    orderItems.push({
                        menu_item_id: parseInt(itemId),
                        quantity: cart[itemId].quantity,
                        unit_price: cart[itemId].item.price
                    });
                }
                
                // Get user ID from token (decode JWT to get user info)
                const token = getAuthToken();
                let userId;
                
                if (token) {
                    try {
                        // Decode JWT token to get user ID
                        const base64Url = token.split('.')[1];
                        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                        }).join(''));
                        
                        const tokenData = JSON.parse(jsonPayload);
                        userId = tokenData.sub; // 'sub' typically contains the user ID in JWT
                    } catch (e) {
                        console.error('Error decoding token:', e);
                        alert('Error: Could not decode authentication token');
                        return;
                    }
                } else {
                    alert('Error: No authentication token found');
                    return;
                }
                
                try {
                    const response = await fetch('/api/orders-with-items', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'Authorization': 'Bearer ' + getAuthToken()
                        },
                        body: JSON.stringify({
                            user_id: userId,
                            order_status: 'pending',
                            payment_status: 'unpaid',
                            items: orderItems
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        // Redirect to payment page with the order ID
                        // Check if data has the expected structure
                        console.log('API Response:', data); // Debug log
                        let orderId;
                        if (data && data.data && data.data.order && data.data.order.id) {
                            orderId = data.data.order.id;
                        } else if (data && data.data && data.data.id) {
                            orderId = data.data.id;
                        } else if (data && data.id) {
                            orderId = data.id;
                        } else {
                            // Try alternative structures that might be returned
                            if (data && data.id) {
                                orderId = data.id;
                            } else if (data && data.data && data.data.order_id) {
                                orderId = data.data.order_id;
                            } else if (data && data.order_id) {
                                orderId = data.order_id;
                            } else {
                                console.error('Unexpected response structure:', data);
                                alert('Error: Unexpected response from server. Response: ' + JSON.stringify(data));
                                return;
                            }
                        }
                        
                        window.location.href = `/bakong-payment?order_id=${orderId}`;
                    } else {
                        // Check if response is not JSON (e.g., HTML error page)
                        if (response.headers.get('content-type') && response.headers.get('content-type').includes('application/json')) {
                            alert('Error creating order: ' + (data.message || data.error || 'Unknown error'));
                            console.error('Order creation error:', data);
                        } else {
                            // Response is not JSON, likely an HTML error page
                            const errorText = await response.text();
                            console.error('Non-JSON response:', errorText);
                            alert('Server error: ' + response.status + ' ' + response.statusText + '. Check console for details.');
                        }
                    }
                } catch (error) {
                    console.error('Error creating order:', error);
                    alert('Error creating order: ' + error.message);
                }
            });
            
            // Make functions available globally for inline onclick handlers
            window.increaseQuantity = increaseQuantity;
            window.decreaseQuantity = decreaseQuantity;
            window.updateQuantity = updateQuantity;
            window.addToCart = addToCart;
            window.removeFromCart = removeFromCart;
            
            // Load menu items when page loads
            loadMenuItems();
        });
    </script>
</body>
</html>
