<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Order API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Debug Order API</h1>
        
        <div class="card p-4">
            <h3>Test Order Creation API</h3>
            
            <form id="debugForm">
                <div class="mb-3">
                    <label for="userId" class="form-label">User ID</label>
                    <input type="number" class="form-control" id="userId" value="1" required>
                </div>
                
                <div class="mb-3">
                    <label for="items" class="form-label">Items (JSON)</label>
                    <textarea class="form-control" id="items" rows="5" required>
[
    {
        "menu_item_id": 1,
        "quantity": 1,
        "unit_price": 5.00
    }
]
                    </textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Test API Call</button>
            </form>
            
            <div id="result" class="mt-4">
                <h5>Result:</h5>
                <pre id="resultText" style="background-color: #f8f9fa; padding: 10px; border-radius: 5px; max-height: 400px; overflow-y: auto;"></pre>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('debugForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userId = document.getElementById('userId').value;
            const itemsText = document.getElementById('items').value;
            
            try {
                const items = JSON.parse(itemsText);
                
                // Get auth token
                const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token') || '';
                
                if (!token) {
                    document.getElementById('resultText').textContent = 'Error: No authentication token found. Please log in first.';
                    return;
                }
                
                const response = await fetch('/api/orders-with-items', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        user_id: parseInt(userId),
                        order_status: 'pending',
                        payment_status: 'pending',
                        items: items
                    })
                });
                
                // Get response text first to see what we're getting
                const responseText = await response.text();
                console.log('Raw response:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    document.getElementById('resultText').textContent = 
                        `Status: ${response.status} ${response.statusText}\n\nResponse (not JSON):\n${responseText}`;
                    return;
                }
                
                const result = {
                    status: response.status,
                    statusText: response.statusText,
                    headers: {
                        'content-type': response.headers.get('content-type')
                    },
                    data: data
                };
                
                document.getElementById('resultText').textContent = JSON.stringify(result, null, 2);
                
            } catch (error) {
                document.getElementById('resultText').textContent = 'Error: ' + error.message;
                console.error('API call error:', error);
            }
        });
    </script>
</body>
</html>
