<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Order Creation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Test Order Creation & Bakong Payment</h1>
        
        <div class="row">
            <div class="col-md-6">
                <h3>Test Order Creation</h3>
                <form id="testOrderForm">
                    <div class="mb-3">
                        <label for="userId" class="form-label">User ID</label>
                        <input type="number" class="form-control" id="userId" value="1" required>
                    </div>
                    <div class="mb-3">
                        <label for="items" class="form-label">Items (JSON format)</label>
                        <textarea class="form-control" id="items" rows="5" required>
[
    {
        "menu_item_id": 1,
        "quantity": 2,
        "unit_price": 5.50
    },
    {
        "menu_item_id": 2,
        "quantity": 1,
        "unit_price": 3.75
    }
]
                        </textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Order</button>
                </form>
                
                <div id="orderResult" class="mt-3"></div>
            </div>
            
            <div class="col-md-6">
                <h3>Test Bakong Payment</h3>
                <form id="testPaymentForm">
                    <div class="mb-3">
                        <label for="orderId" class="form-label">Order ID</label>
                        <input type="number" class="form-control" id="orderId" required>
                    </div>
                    <button type="submit" class="btn btn-success">Initiate Bakong Payment</button>
                </form>
                
                <div id="paymentResult" class="mt-3">
                    <div id="qrCodeContainer" class="text-center" style="display: none;">
                        <h5>QR Code</h5>
                        <img id="qrCodeImage" src="" alt="QR Code" style="max-width: 250px; max-height: 250px;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Function to get auth token
            function getAuthToken() {
                return localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token') || '';
            }
            
            // Test order creation
            document.getElementById('testOrderForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const userId = document.getElementById('userId').value;
                const itemsText = document.getElementById('items').value;
                
                try {
                    const items = JSON.parse(itemsText);
                    
                    const response = await fetch('/api/orders-with-items', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'Authorization': 'Bearer ' + getAuthToken()
                        },
                        body: JSON.stringify({
                            user_id: parseInt(userId),
                            order_status: 'pending',
                            payment_status: 'pending',
                            items: items
                        })
                    });
                    
                    const data = await response.json();
                    
                    const resultDiv = document.getElementById('orderResult');
                    if (response.ok) {
                        resultDiv.innerHTML = `
                            <div class="alert alert-success">
                                <h5>Order Created Successfully!</h5>
                                <p><strong>Order ID:</strong> ${data.data.order.id}</p>
                                <p><strong>Total Amount:</strong> $${data.data.order.total_amount}</p>
                                <p><strong>Status:</strong> ${data.data.order.order_status}</p>
                                <button class="btn btn-sm btn-success" onclick="fillOrderId(${data.data.order.id})">Use for Payment Test</button>
                            </div>
                        `;
                    } else {
                        resultDiv.innerHTML = `
                            <div class="alert alert-danger">
                                <h5>Error Creating Order</h5>
                                <p>${data.message || data.error}</p>
                            </div>
                        `;
                    }
                } catch (error) {
                    document.getElementById('orderResult').innerHTML = `
                        <div class="alert alert-danger">
                            <h5>Error</h5>
                            <p>${error.message}</p>
                        </div>
                    `;
                }
            });
            
            // Test payment creation
            document.getElementById('testPaymentForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const orderId = document.getElementById('orderId').value;
                
                try {
                    const response = await fetch('/api/payments/bakong/initiate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'Authorization': 'Bearer ' + getAuthToken()
                        },
                        body: JSON.stringify({
                            order_id: parseInt(orderId)
                        })
                    });
                    
                    const data = await response.json();
                    
                    const resultDiv = document.getElementById('paymentResult');
                    if (response.ok) {
                        document.getElementById('qrCodeImage').src = data.data.qr_code;
                        document.getElementById('qrCodeContainer').style.display = 'block';
                        
                        resultDiv.innerHTML += `
                            <div class="alert alert-success mt-3">
                                <h5>Payment Initiated Successfully!</h5>
                                <p><strong>Payment ID:</strong> ${data.data.payment_id}</p>
                                <p><strong>Amount:</strong> $${data.data.amount}</p>
                                <p><strong>Status:</strong> ${data.data.payment_status}</p>
                            </div>
                        `;
                    } else {
                        resultDiv.innerHTML += `
                            <div class="alert alert-danger mt-3">
                                <h5>Error Initiating Payment</h5>
                                <p>${data.message || data.error}</p>
                            </div>
                        `;
                    }
                } catch (error) {
                    document.getElementById('paymentResult').innerHTML += `
                        <div class="alert alert-danger mt-3">
                            <h5>Error</h5>
                            <p>${error.message}</p>
                        </div>
                    `;
                }
            });
            
            // Function to fill order ID in payment form
            window.fillOrderId = function(orderId) {
                document.getElementById('orderId').value = orderId;
            };
        });
    </script>
</body>
</html>
